version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: taxipool_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - taxipool_network

  redis:
    image: redis:latest
    container_name: taxipool_redis
    ports:
      - "6379:6379"
    networks:
      - taxipool_network

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: taxipool_backend
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27017/taxi-pooling
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretjwtkeyfordocker123!
    depends_on:
      - mongodb
      - redis
    networks:
      - taxipool_network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: taxipool_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=https://fs098-taxi-pooling.onrender.com/api
    depends_on:
      - backend
    networks:
      - taxipool_network

volumes:
  mongodb_data:

networks:
  taxipool_network:
    driver: bridge
